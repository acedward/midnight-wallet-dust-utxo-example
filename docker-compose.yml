# Midnight 1.0.0 single-wallet throughput benchmark stack.
#
#   docker compose up -d --build      # start everything
#   curl localhost:3300/health        # wait for {"ready":true}
#   node bench/bench.mjs              # run the 1/5/20/50/100 benchmark
#
# Versions follow the midnight-ref-ai v1.0.0 slot:
#   node 1.0.0 · indexer-standalone 4.3.2 · proof-server 8.1.0

services:
  node:
    image: 'midnightntwrk/midnight-node:${NODE_TAG:-1.0.0}'
    container_name: fast-tx-node
    ports:
      - '127.0.0.1:${NODE_PORT:-9944}:9944'
    environment:
      CFG_PRESET: 'dev'
      SIDECHAIN_BLOCK_BENEFICIARY: '04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e'
    healthcheck:
      test:
        - 'CMD-SHELL'
        - >
          curl -fs -H 'Content-Type: application/json' -d
          '{"id":1,"jsonrpc":"2.0","method":"chain_getBlockHash","params":[1]}' http://localhost:9944 | grep -q
          '"result":"0x'
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  indexer:
    image: 'midnightntwrk/indexer-standalone:${INDEXER_TAG:-4.3.2}'
    container_name: fast-tx-indexer
    ports:
      - '127.0.0.1:${INDEXER_PORT:-8088}:8088'
    environment:
      RUST_LOG: 'indexer=info,chain_indexer=info,indexer_api=info,wallet_indexer=info,indexer_common=info,fastrace_opentelemetry=off,info'
      APP__APPLICATION__NETWORK_ID: 'undeployed'
      APP__INFRA__NODE__URL: 'ws://node:9944'
      APP__INFRA__STORAGE__PASSWORD: 'indexer'
      APP__INFRA__PUB_SUB__PASSWORD: 'indexer'
      APP__INFRA__LEDGER_STATE_STORAGE__PASSWORD: 'indexer'
      APP__INFRA__SECRET: '303132333435363738393031323334353637383930313233343536373839303132'
      APP__INFRA__SPO_NODE__URL: 'ws://node:9944'
      APP__INFRA__SPO_NODE__BLOCKFROST_ID: 'e2e-test-dummy-id'
    healthcheck:
      # image has neither curl nor wget — probe the file the indexer writes when running
      test: ['CMD-SHELL', 'cat /var/run/indexer-standalone/running']
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 60s
    depends_on:
      node:
        condition: service_healthy

  proof-server:
    image: 'midnightntwrk/proof-server:${PROOF_TAG:-8.1.0}'
    container_name: fast-tx-proof-server
    ports:
      - '127.0.0.1:${PROOF_PORT:-6300}:6300'
    environment:
      RUST_BACKTRACE: 'full'
      EXTRA_ARGS: '-v'
    # distroless image: no shell for a healthcheck; consumers retry on the port instead

  startscript:
    build: .
    container_name: fast-tx-startscript
    command: ['node', 'dist/startscript.js']
    restart: 'no'
    environment:
      NODE_URL: 'http://node:9944'
      INDEXER_URL: 'http://indexer:8088/api/v4/graphql'
      INDEXER_WS_URL: 'ws://indexer:8088/api/v4/graphql/ws'
      PROOF_SERVER_URL: 'http://proof-server:6300'
      NETWORK_ID: 'undeployed'
      STATE_FILE: '/shared/state.json'
      TARGET_UTXOS: '${TARGET_UTXOS:-20}'
      EXTERNAL_UTXOS: '${EXTERNAL_UTXOS:-}'
      OUTPUTS_PER_TX: '${OUTPUTS_PER_TX:-10}'
    volumes:
      - shared:/shared
    depends_on:
      node:
        condition: service_healthy
      indexer:
        condition: service_healthy
      proof-server:
        condition: service_started

  api:
    build: .
    container_name: fast-tx-api
    command: ['node', 'dist/api.js']
    ports:
      - '127.0.0.1:${API_PORT:-3300}:3300'
    environment:
      NODE_URL: 'http://node:9944'
      INDEXER_URL: 'http://indexer:8088/api/v4/graphql'
      INDEXER_WS_URL: 'ws://indexer:8088/api/v4/graphql/ws'
      PROOF_SERVER_URL: 'http://proof-server:6300'
      NETWORK_ID: 'undeployed'
      STATE_FILE: '/shared/state.json'
      PORT: '3300'
      TX_CONCURRENCY: '${TX_CONCURRENCY:-8}'
      FEE_BLOCKS_MARGIN: '${FEE_BLOCKS_MARGIN:-5}'
    volumes:
      - shared:/shared
    depends_on:
      node:
        condition: service_healthy
      indexer:
        condition: service_healthy
      proof-server:
        condition: service_started

volumes:
  shared:
