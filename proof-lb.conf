# Round-robins proving requests across the proof-server replicas.
# Proofs are long-running POSTs with large bodies — buffering off, generous timeouts.
events {}
http {
  upstream provers {
    least_conn;
    server proof-server:6300;
    server proof-server-2:6300;
    server proof-server-3:6300;
  }
  server {
    listen 6300;
    location / {
      proxy_pass http://provers;
      proxy_http_version 1.1;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      client_max_body_size 64m;
      proxy_request_buffering off;
      proxy_buffering off;
    }
  }
}
